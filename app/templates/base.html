<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Paperless Generator Portal{% endblock %}</title>
<style>
  :root {
    --bg: #0f1115; --bg2: #171a21; --bg3: #1f232c; --border: #2b303b;
    --text: #e6e9ef; --text-dim: #9aa4b2; --accent: #3b82f6; --accent2: #60a5fa;
    --ok: #34d399; --err: #f87171; --font: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: var(--font); display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; background: var(--bg2); border-bottom: 1px solid var(--border);
  }
  header .brand { font-weight: 700; letter-spacing: .2px; }
  header .brand span { color: var(--accent2); }
  header nav a { color: var(--text-dim); text-decoration: none; margin-left: 18px; font-size: 14px; }
  header nav a:hover { color: var(--accent2); }
  main { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px; }
  .card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 28px 30px; width: 100%; max-width: 460px; box-shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  .card h1 { margin: 0 0 4px; font-size: 21px; }
  .card h2 { margin: 26px 0 12px; font-size: 15px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
  .card p.sub { margin: 0 0 20px; color: var(--text-dim); font-size: 14px; }
  label { display: block; margin: 14px 0 6px; font-size: 13px; color: var(--text-dim); }
  input[type=text], input[type=password], input[type=url] {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text); font-size: 14px; font-family: var(--font);
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    margin-top: 18px; width: 100%; padding: 11px; border: none; border-radius: 8px;
    background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:hover { background: var(--accent2); }
  .msg { margin: 14px 0 0; padding: 10px 12px; border-radius: 8px; font-size: 13.5px; }
  .msg.ok { background: rgba(52,211,153,.12); border: 1px solid var(--ok); color: var(--ok); }
  .msg.err { background: rgba(248,113,113,.12); border: 1px solid var(--err); color: var(--err); }
  .hint { font-size: 12.5px; color: var(--text-dim); margin-top: 6px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 26px 0 0; }
  code { background: var(--bg3); padding: 2px 6px; border-radius: 4px; font-size: 12.5px; }
  a.link { color: var(--accent2); text-decoration: none; }
</style>
</head>
<body>
{% block header %}
<header>
  <div class="brand">Paperless <span>Generator Portal</span></div>
  <nav>
    <a href="{{ url_for('index') }}">Generator</a>
    <a href="{{ url_for('profiles') }}">Profile</a>
    <a href="{{ url_for('settings') }}">Einstellungen</a>
    <a href="{{ url_for('logout') }}">Logout</a>
  </nav>
</header>
{% endblock %}
<main>{% block content %}{% endblock %}</main>
</body>
</html>
